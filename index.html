<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave &amp; Shrinkage Management Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#0073bb;--primary-dark:#005a8e;--danger:#d13212;--warn:#ff9900;--success:#1d8102;--purple:#6b21a8;--bg:#f2f3f3;--card:#fff;--border:#d5dbdb;--text:#16191f;--muted:#545b64;--light:#fafafa}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--primary);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
.header{background:#232f3e;color:#fff;padding:14px 28px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}
.header .sub{font-size:12px;color:#aab7b8;margin-top:2px}
.header-actions{display:flex;gap:10px;align-items:center}
.app{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:240px;background:#fff;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 52px)}
.sidebar .nav-section{padding:0 16px;margin-bottom:20px}
.sidebar .nav-title{font-size:10px;text-transform:uppercase;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--muted);border-radius:6px;margin:2px 8px;transition:all .15s}
.sidebar .nav-item:hover{background:#f0f4f8;color:var(--text)}
.sidebar .nav-item.active{background:#e6f2ff;color:var(--primary);font-weight:600}
.sidebar .nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar .nav-item .badge-count{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
.main{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 52px)}
.container{max-width:1200px;margin:0 auto}
.breadcrumb{display:flex;gap:6px;align-items:center;margin-bottom:16px;font-size:12px;flex-wrap:wrap}
.breadcrumb .sep{color:#aab7b8}
.breadcrumb .current{font-weight:600;color:var(--text)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:700;margin-bottom:14px}
.card h3{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat .val{font-size:28px;font-weight:700;color:var(--primary)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.stat.red .val{color:var(--danger)}
.stat.green .val{color:var(--success)}
.stat.orange .val{color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--light);text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid #eaeded}
tr:hover{background:#f7f8f8}
.num{text-align:center;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-blue{background:#e6f2ff;color:var(--primary)}
.b-red{background:#fce9e6;color:var(--danger)}
.b-orange{background:#fff3e0;color:#c45500}
.b-green{background:#e6f9e6;color:var(--success)}
.b-purple{background:#f3e8ff;color:var(--purple)}
.b-gray{background:#eaeded;color:var(--muted)}
.btn{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-p{background:var(--primary);color:#fff}
.btn-p:hover{background:var(--primary-dark)}
.btn-s{background:#fff;color:var(--muted);border:1px solid var(--border)}
.btn-s:hover{background:var(--light)}
.btn-d{background:var(--danger);color:#fff}
.btn-d:hover{background:#a82a0c}
.btn-g{background:var(--success);color:#fff}
.btn-g:hover{background:#156b01}
.btn-sm{padding:4px 10px;font-size:11px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;font-weight:600;color:var(--muted)}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,115,187,.15)}
.fr{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.mgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:20px}
.mgr-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:all .15s;position:relative}
.mgr-card:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(0,115,187,.12)}
.mgr-card .mn{font-size:14px;font-weight:700;margin-bottom:2px}
.mgr-card .mt{font-size:11px;color:var(--muted);margin-bottom:10px}
.mgr-card .ms{display:flex;gap:14px}
.mgr-card .ms div{text-align:center}
.mgr-card .ms .mv{font-size:18px;font-weight:700;color:var(--primary)}
.mgr-card .ms .ml{font-size:9px;color:var(--muted)}
.mgr-card .mb{position:absolute;top:10px;right:10px}
.cal{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--light);border-bottom:1px solid var(--border)}
.cal-header h3{font-size:14px;font-weight:600}
.cal-nav{display:flex;gap:8px}
.cal-nav button{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px}
.cal-nav button:hover{background:#eaeded}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-header{padding:8px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);background:var(--light);border-bottom:1px solid var(--border)}
.cal-day{min-height:80px;padding:4px 6px;border-right:1px solid #eaeded;border-bottom:1px solid #eaeded;font-size:11px;position:relative}
.cal-day:nth-child(7n){border-right:none}
.cal-day .day-num{font-weight:600;color:var(--text);margin-bottom:4px}
.cal-day.other .day-num{color:#ccc}
.cal-day.today{background:#e6f2ff}
.cal-day .leave-dot{display:inline-block;padding:1px 4px;border-radius:3px;font-size:9px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cal-day .leave-dot.planned{background:#dbeafe;color:#1e40af}
.cal-day .leave-dot.unplanned{background:#fce9e6;color:var(--danger)}
.cal-day .leave-dot.halfday{background:#fff3e0;color:#c45500}
.avail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.avail-card{padding:10px;border-radius:6px;text-align:center;font-size:12px}
.avail-card .aa{font-weight:700;font-size:13px;margin-bottom:2px}
.avail-card.available{background:#e6f9e6;border:1px solid #b7e1b7}
.avail-card.on-leave{background:#fce9e6;border:1px solid #f5c6c0}
.avail-card.half{background:#fff3e0;border:1px solid #ffd699}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:8px;padding:24px;width:560px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.bar-chart{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{width:90px;font-size:11px;text-align:right;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:#eaeded;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:5px;font-size:10px;color:#fff;font-weight:600}
.legend{display:flex;gap:14px;margin-bottom:10px}
.legend-i{display:flex;align-items:center;gap:5px;font-size:11px}
.legend-d{width:10px;height:10px;border-radius:2px}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* SPREADSHEET */
.spreadsheet{width:100%;overflow-x:auto}
.spreadsheet table{min-width:800px}
.spreadsheet td{position:relative}
.spreadsheet td input,.spreadsheet td select{width:100%;border:none;background:transparent;padding:4px;font-size:12px;font-family:inherit}
.spreadsheet td input:focus,.spreadsheet td select:focus{outline:2px solid var(--primary);border-radius:2px;background:#fff}
.spreadsheet tr.edited{background:#fff8e1}
.cell-actions{display:flex;gap:4px}
/* DAILY TRACKER */
.daily-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.daily-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.daily-card .dc-name{font-weight:700;font-size:13px;margin-bottom:4px}
.daily-card .dc-status{font-size:12px;margin-top:6px}
.daily-card.present{border-left:4px solid var(--success)}
.daily-card.absent{border-left:4px solid var(--danger)}
.daily-card.halfday{border-left:4px solid var(--warn)}
.toast{position:fixed;bottom:20px;right:20px;background:#232f3e;color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;z-index:2000;display:none;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:768px){.app{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:none}.main{max-height:none}.cal-day{min-height:50px}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<div><h1>Leave &amp; Shrinkage Management</h1><div class="sub">Org: Sarad Agarwal &mdash; Selling Partner Experience-VAR</div></div>
<div class="header-actions">
<button class="btn btn-g" onclick="pushToQuip()">&#9650; Push to Quip</button>
<button class="btn btn-s" onclick="pullFromQuip()">&#9660; Pull from Quip</button>
<button class="btn btn-s" onclick="refreshDashboard()">&#8635; Refresh</button>
<button class="btn btn-p" onclick="exportCSV()">Export CSV</button>
</div>
</div>
<div class="app">
<div class="sidebar" id="sidebar"></div>
<div class="main"><div class="container" id="main"></div></div>
</div>
<div class="modal-bg" id="modal" onclick="closeModal(event)"><div class="modal" id="modal-content"></div></div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
<script src="quip-sync.js"></script>
</body>
</html>
