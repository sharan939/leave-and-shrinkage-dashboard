<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Temporarily Unavailable</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #232f3e 0%, #37475a 100%);
    color:#fff; min-height:100vh;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;
  }
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 48px 40px; max-width: 520px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .lock { font-size: 56px; margin-bottom: 18px; }
  h1 { font-size: 24px; margin-bottom: 14px; color:#ff9900; }
  p { font-size: 15px; line-height: 1.6; color:#d5dbdb; margin-bottom: 12px; }
  .note { font-size: 13px; color:#9aa4ad; margin-top: 20px; }
</style>
</head>
<body>
  <div class="card">
    <div class="lock">&#128274;</div>
    <h1>Dashboard Temporarily Unavailable</h1>
    <p>The Leave &amp; Shrinkage Dashboard is currently offline while we migrate it to a secure, Amazon-internal hosting platform.</p>
    <p>Access will be restored shortly with sign-in required. Thanks for your patience.</p>
    <p class="note">For questions, please reach out to the dashboard owner.</p>
  </div>
</body>
</html>
